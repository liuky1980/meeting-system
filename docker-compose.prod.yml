version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: meeting-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
    depends_on:
      - signaling
      - client
    restart: unless-stopped
    networks:
      - meeting-network

  # 信令服务器
  signaling:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: meeting-signaling
    environment:
      - PORT=3000
      - CLIENT_URL=https://your-domain.com
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - meeting-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端客户端
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: meeting-client
    environment:
      - NODE_ENV=production
    depends_on:
      - signaling
    restart: unless-stopped
    networks:
      - meeting-network

  # 飞书机器人
  feishu-bot:
    build:
      context: ./feishu-bot
      dockerfile: Dockerfile
    container_name: meeting-feishu-bot
    environment:
      - PORT=3001
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - CLIENT_URL=https://your-domain.com
      - SIGNALLING_URL=http://signaling:3000
    restart: unless-stopped
    networks:
      - meeting-network

networks:
  meeting-network:
    driver: bridge
